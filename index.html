<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teleenfermería Comunitaria - Sistema de Atención Médica</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app"></div>

    <!-- Login Modal -->
    <div id="loginModal" class="modal active">
        <div class="modal-content">
            <div class="login-container">
                <div class="login-header">
                    <h1>🏥 Teleenfermería Comunitaria</h1>
                    <p>Sistema Integrado de Atención Médica</p>
                </div>

                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" placeholder="tu@email.com" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">Iniciar Sesión</button>
                </form>

                <div class="login-divider">O</div>

                <button class="btn btn-secondary btn-full" id="toggleRegister">¿No tienes cuenta? Regístrate</button>

                <!-- Demo Users Info -->
                <div class="demo-info">
                    <h3>👨‍💻 Usuarios de Demostración</h3>
                    <p><strong>Paciente:</strong> paciente@example.com / 123456</p>
                    <p><strong>Enfermera:</strong> enfermera@example.com / 123456</p>
                    <p><strong>Médico:</strong> medico@example.com / 123456</p>
                    <p><strong>Admin:</strong> admin@example.com / 123456</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Register Modal -->
    <div id="registerModal" class="modal">
        <div class="modal-content">
            <div class="login-container">
                <button class="btn-close" id="closeRegister">&times;</button>
                <div class="login-header">
                    <h1>Crear Nueva Cuenta</h1>
                    <p>Registro en el Sistema</p>
                </div>

                <form id="registerForm" class="login-form">
                    <div class="form-group">
                        <label for="regName">Nombre Completo</label>
                        <input type="text" id="regName" placeholder="Juan Pérez" required>
                    </div>

                    <div class="form-group">
                        <label for="regEmail">Correo Electrónico</label>
                        <input type="email" id="regEmail" placeholder="tu@email.com" required>
                    </div>

                    <div class="form-group">
                        <label for="regRole">Tipo de Usuario</label>
                        <select id="regRole" required>
                            <option value="">Selecciona tu rol</option>
                            <option value="paciente">Paciente</option>
                            <option value="enfermera">Enfermera</option>
                            <option value="medico">Médico</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="regPassword">Contraseña</label>
                        <input type="password" id="regPassword" placeholder="••••••••" required>
                    </div>

                    <div class="form-group">
                        <label for="regConfirmPassword">Confirmar Contraseña</label>
                        <input type="password" id="regConfirmPassword" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">Registrarse</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/database.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
